<!doctype html>
<html lang="en">
    <head>
        <title>Startpage</title>

        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        />
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>

        <!-- Jquery -->
        <script
            src="https://code.jquery.com/jquery-4.0.0.slim.min.js"
            crossorigin="anonymous"
        ></script>

        <!-- script / css -->
        <script src="homepage.js"></script>
        <link rel="stylesheet" href="homepage.css" />
    </head>
    <body>
        <div class="container-xl">
            <div class="row">
                <div class="col-8 mx-auto">
                    <!-- header -->
                    <div class="row my-5">
                        <div class="col text-center">
                            <h1 id="title" class="display-1">Startpage</h1>
                        </div>
                    </div>

                    <!-- add engine form -->
                    <div class="row">
                        <div class="col">
                            <form>
                                <div class="row">
                                    <div class="col">
                                        <input
                                            id="add-engine-label"
                                            class="form-control"
                                            type="text"
                                            placeholder="Engine label"
                                        />
                                    </div>
                                    <div class="col-8">
                                        <input
                                            id="add-search-url"
                                            class="form-control"
                                            type="text"
                                            placeholder="Search URL"
                                        />
                                    </div>
                                    <div class="col-auto">
                                        <button
                                            type="submit"
                                            class="btn btn-primary btn-square"
                                        >
                                            <i class="bi bi-plus-lg"></i>
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- List of engines -->
                    <div id="engines" class="row gy-3 mt-3">
                        <div id="engine-skeleton" class="col-12">
                            <form id="form-skeleton">
                                <div class="row">
                                    <label
                                        id="label-skeleton"
                                        for="query-skeleton"
                                        class="col col-form-label"
                                    >
                                        <h5>Engine label</h5>
                                    </label>
                                    <div class="col-8">
                                        <input
                                            id="query-skeleton"
                                            class="form-control"
                                            type="text"
                                        />
                                    </div>
                                    <div class="col-auto">
                                        <!-- type="button" is important here, otherwise type="submit" is assumed which we don't want -->
                                        <button
                                            tabindex="-1"
                                            type="button"
                                            id="delete-skeleton"
                                            class="btn btn-danger btn-square"
                                        >
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
