<!doctype html>
<html lang="en">
    <head>
        <title>Startpage</title>

        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        />
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>

        <!-- Jquery -->
        <script
            src="https://code.jquery.com/jquery-4.0.0.min.js"
            crossorigin="anonymous"
        ></script>

        <!-- script / css -->
        <script src="homepage.js"></script>
        <link rel="stylesheet" href="homepage.css" />
    </head>
    <body>
        <!-- navbar -->
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-xl">
                <div class="col-8 mx-auto d-flex align-items-center">
                    <span id="title" class="navbar-brand me-4">
                        <!-- Title will be placed here with JS -->
                    </span>
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <input
                                class="form-check-input"
                                type="checkbox"
                                value=""
                                id="open-in-new-tab"
                            />
                            <label
                                class="form-check-label"
                                for="open-in-new-tab"
                                >Open result in new tab</label
                            >
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="container-xl mt-3">
            <div class="row">
                <div class="col-8 mx-auto">
                    <!-- add engine form -->
                    <div class="row">
                        <div class="col">
                            <form
                                id="add-engine"
                                class="needs-validation"
                                autocomplete="off"
                                novalidate
                            >
                                <label
                                    for="add-engine-label"
                                    class="form-label"
                                >
                                    Add a new search engine
                                </label>
                                <div class="row">
                                    <div class="col">
                                        <input
                                            id="add-engine-label"
                                            class="form-control"
                                            type="text"
                                            placeholder="e.g., Google"
                                            required
                                        />
                                        <div class="invalid-feedback"></div>
                                    </div>
                                    <div class="col-8">
                                        <input
                                            id="add-search-url"
                                            class="form-control"
                                            type="url"
                                            placeholder="Search URL, e.g., https://www.google.com/search?q=%s"
                                            required
                                        />
                                        <div class="invalid-feedback"></div>
                                    </div>
                                    <div class="col-auto">
                                        <button
                                            type="submit"
                                            class="btn btn-primary btn-square"
                                        >
                                            <i class="bi bi-plus-lg"></i>
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>

                    <hr />

                    <!-- List of engines -->
                    <div id="engines" class="row gy-3">
                        <div
                            id="engine-skeleton"
                            class="col-12"
                            style="display: none"
                        >
                            <form id="form-skeleton" autocomplete="off">
                                <div class="row">
                                    <label
                                        id="label-skeleton"
                                        for="query-skeleton"
                                        class="col col-form-label"
                                    >
                                        <h5>Engine label</h5>
                                    </label>
                                    <div class="col-8">
                                        <input
                                            id="query-skeleton"
                                            class="form-control"
                                            type="text"
                                            placeholder="Query"
                                        />
                                    </div>
                                    <div class="col-auto">
                                        <!-- type="button" is important here, otherwise type="submit" is assumed which we don't want -->
                                        <button
                                            tabindex="-1"
                                            type="button"
                                            id="delete-skeleton"
                                            class="btn btn-danger btn-square"
                                        >
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
